<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendStats.ai</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff 0%, #a855f7 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 2rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(59,130,246,0.3);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn.loading {
            opacity: 0.6;
            cursor: wait;
            transform: none;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-card {
            background: #111115;
            border: 1px solid #27272a;
            border-radius: 16px;
            padding: 1.8rem;
        }

        .insight {
            font-size: 0.95rem;
            line-height: 1.7;
            color: #e4e4e7;
            white-space: pre-wrap;
            font-family: monospace;
        }

        .timestamp {
            margin-top: 1.2rem;
            padding-top: 0.8rem;
            border-top: 1px solid #27272a;
            font-size: 0.7rem;
            color: #52525b;
            text-align: right;
        }

        .placeholder {
            color: #52525b;
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">TRENDSTATS.AI</div>
        </div>

        <button class="btn" id="analyzeBtn">
            Trendleri Analiz Et
        </button>

        <div class="result-card" id="resultCard" style="display: none;">
            <div class="insight" id="insightText"></div>
            <div class="timestamp" id="timestamp"></div>
        </div>

        <div class="result-card" id="loadingCard">
            <div class="placeholder">Analiz için butona tıklayın</div>
        </div>
    </div>

    <script>
        const analyzeBtn = document.getElementById('analyzeBtn');
        const resultCard = document.getElementById('resultCard');
        const loadingCard = document.getElementById('loadingCard');
        const insightText = document.getElementById('insightText');
        const timestampEl = document.getElementById('timestamp');

        async function analyzeTrends() {
            analyzeBtn.classList.add('loading');
            analyzeBtn.innerHTML = '<span class="spinner"></span> Analiz ediliyor...';
            
            loadingCard.style.display = 'block';
            resultCard.style.display = 'none';

            try {
                const response = await fetch('/api/trends/all');
                const data = await response.json();

                loadingCard.style.display = 'none';
                resultCard.style.display = 'block';
                
                insightText.innerHTML = data.insight.replace(/\n/g, '<br>');
                
                const date = new Date(data.timestamp);
                timestampEl.innerHTML = `Son güncelleme: ${date.toLocaleDateString('tr-TR')} ${date.toLocaleTimeString('tr-TR')}`;
                
            } catch (error) {
                loadingCard.style.display = 'block';
                loadingCard.querySelector('.placeholder').innerHTML = 'Bağlantı hatasi. Lütfen tekrar deneyin.';
                resultCard.style.display = 'none';
            } finally {
                analyzeBtn.classList.remove('loading');
                analyzeBtn.innerHTML = 'Trendleri Analiz Et';
            }
        }

        analyzeBtn.addEventListener('click', analyzeTrends);
    </script>
</body>
</html>
