<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>TrendStats.ai</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f1a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 50px;
      font-size: 40px;
      background: linear-gradient(to right, #6a5cff, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    button {
      margin-top: 30px;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(to right, #4f46e5, #9333ea);
      color: white;
      cursor: pointer;
    }

    #result {
      margin: 40px auto;
      width: 80%;
      max-width: 700px;
      background: #1a1a2e;
      padding: 20px;
      border-radius: 12px;
      text-align: left;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <h1>TRENDSTATS.AI</h1>

  <button onclick="getTrends()">Trendleri Analiz Et</button>

  <div id="result">Henüz veri yok...</div>

  <script>
    async function getTrends() {
      const resultDiv = document.getElementById("result");
      resultDiv.innerText = "taranıyor...";

      try {
        const res = await fetch("WORKER_LINK_BURAYA");
        const data = await res.json();

        resultDiv.innerText = data.insight || "veri geldi ama boş";
      } catch (err) {
        resultDiv.innerText = "API hata verdi 😢";
      }
    }
  </script>

</body>
</html>
